<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Inventaris SKB Muara Badak</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
.hidden{display:none}
header{background:#1e40af;color:#fff;padding:12px;display:flex;justify-content:space-between}
.container{padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#e5e7eb}
input,select,button{padding:8px;margin:4px;width:100%}
button{border:none;border-radius:6px;cursor:pointer}
button:hover{opacity:0.85}
.primary{background:#2563eb;color:#fff}
.success{background:#16a34a;color:#fff}
.danger{background:#dc2626;color:#fff}
.low{background:#fee2e2}

/* MODAL FIX */
#modalEdit{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#modalEdit.show{
display:flex;
}

#modalEdit .box{
background:#fff;
padding:20px;
border-radius:12px;
width:300px;
}

#modalEdit input,#modalEdit select{
width:100%;
margin-bottom:10px;
padding:8px;
box-sizing:border-box;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" style="max-width:400px;margin:40px auto;background:#fff;padding:20px;border-radius:12px;text-align:center">
<h3>Inventaris SKB</h3>
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
<h3>Dashboard Inventaris</h3>
<button class="danger" onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- MENU -->
<div class="card">
<button class="primary" onclick="show('masuk')">Barang Masuk</button>
<button class="danger" onclick="show('keluar')">Barang Keluar</button>
</div>

<!-- FILTER -->
<div class="card">
<input id="search" placeholder="Cari barang..." onkeyup="update()">
<select id="filterTipe" onchange="update()">
<option value="">Semua</option>
<option value="Masuk">Masuk</option>
<option value="Keluar">Keluar</option>
</select>
</div>

<!-- RINGKASAN -->
<div class="card">
<h3>Ringkasan Stok</h3>
<div id="ringkasan"></div>
</div>

<!-- MASUK -->
<div class="card hidden" id="masuk">
<h3>Barang Masuk</h3>
<input id="mBarang" placeholder="Nama Barang">
<select id="mJenis"><option>Barang Modal</option><option>BAJAS</option></select>
<select id="mDana"><option>BOSKAB 1</option><option>BOSKAB 2</option><option>BOP 1</option><option>BOP 2</option></select>
<input type="number" id="mJumlah" placeholder="Jumlah">
<select id="mSatuan"><option>pcs</option><option>unit</option></select>
<button class="success" onclick="barangMasuk()">Simpan</button>
</div>

<!-- KELUAR -->
<div class="card hidden" id="keluar">
<h3>Barang Keluar</h3>
<select id="kBarang" onchange="isiJenisDana()"></select>
<select id="kJenis"><option>Barang Modal</option><option>BAJAS</option></select>
<select id="kDana"><option>BOSKAB 1</option><option>BOSKAB 2</option><option>BOP 1</option><option>BOP 2</option></select>
<input type="number" id="kJumlah">
<select id="kSatuan"><option>pcs</option><option>unit</option></select>
<input id="kAmbil" placeholder="Pengambil">
<button class="danger" onclick="barangKeluar()">Simpan</button>
</div>

<!-- TABEL -->
<div class="card">
<table id="tabel"></table>
</div>

</div>
</div>

<!-- MODAL EDIT -->
<div id="modalEdit">
<div class="box">
<h3>Edit Data</h3>

<input id="eBarang">
<select id="eJenis"><option>Barang Modal</option><option>BAJAS</option></select>
<select id="eDana"><option>BOSKAB 1</option><option>BOSKAB 2</option><option>BOP 1</option><option>BOP 2</option></select>
<input type="number" id="eJumlah">
<select id="eSatuan"><option>pcs</option><option>unit</option></select>
<input id="eAmbil" placeholder="Pengambil">

<button class="success" onclick="simpanEdit()">Simpan</button>
<button onclick="tutupModal()">Batal</button>
</div>
</div>

<script>

let data = JSON.parse(localStorage.getItem('inv')) || [];
let editIndex=null;

function login(){
loginBox.classList.add('hidden');
app.classList.remove('hidden');
update();
}

function logout(){localStorage.clear();location.reload();}

function show(id){
masuk.classList.add('hidden');
keluar.classList.add('hidden');
document.getElementById(id).classList.remove('hidden');
}

function getStok(n,j,d,s){
let m=0,k=0;
data.forEach(x=>{
if(x.barang===n&&x.jenis===j&&x.dana===d&&x.satuan===s){
if(x.tipe==='Masuk') m+=x.jumlah;
if(x.tipe==='Keluar') k+=x.jumlah;
}});
return m-k;
}

function barangMasuk(){
data.push({
tipe:'Masuk',
barang:mBarang.value,
jenis:mJenis.value,
dana:mDana.value,
jumlah:+mJumlah.value,
satuan:mSatuan.value
});
simpan();
}

function isiJenisDana(){
let d=data.find(x=>x.barang===kBarang.value);
if(d){
kJenis.value=d.jenis;
kDana.value=d.dana;
kSatuan.value=d.satuan;
}
}

function barangKeluar(){
let stok=getStok(kBarang.value,kJenis.value,kDana.value,kSatuan.value);
if(kJumlah.value>stok) return alert("Stok tidak cukup!");

data.push({
tipe:'Keluar',
barang:kBarang.value,
jenis:kJenis.value,
dana:kDana.value,
jumlah:+kJumlah.value,
satuan:kSatuan.value,
ambil:kAmbil.value
});
simpan();
}

function simpan(){
localStorage.setItem('inv',JSON.stringify(data));
update();
}

function update(){

kBarang.innerHTML='';
[...new Set(data.map(d=>d.barang))].forEach(b=>kBarang.innerHTML+=`<option>${b}</option>`);

tabel.innerHTML=`<tr>
<th>No</th><th>Tipe</th><th>Barang</th><th>Jumlah</th><th>Sisa</th><th>Aksi</th>
</tr>`;

data.slice().reverse().forEach((d,i)=>{
let idx=data.length-1-i;
let stok=getStok(d.barang,d.jenis,d.dana,d.satuan);

tabel.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${d.tipe}</td>
<td>${d.barang}</td>
<td>${d.jumlah}</td>
<td>${stok}</td>
<td>
<button onclick="openEdit(${idx})">Edit</button>
<button onclick="hapusData(${idx})" class="danger">Hapus</button>
</td>
</tr>`;
});

// ringkasan
let sum={};
data.forEach(d=>{
if(!sum[d.barang]) sum[d.barang]=0;
if(d.tipe==='Masuk') sum[d.barang]+=d.jumlah;
if(d.tipe==='Keluar') sum[d.barang]-=d.jumlah;
});

ringkasan.innerHTML='';
for(let k in sum){
ringkasan.innerHTML+=`<p>${k}: ${sum[k]}</p>`;
}

}

// EDIT MODAL
function openEdit(i){
editIndex=i;
let d=data[i];

modalEdit.classList.add('show');

eBarang.value=d.barang;
eJenis.value=d.jenis;
eDana.value=d.dana;
eJumlah.value=d.jumlah;
eSatuan.value=d.satuan;
eAmbil.value=d.ambil||'';
}

function simpanEdit(){
let d=data[editIndex];

data[editIndex]={
...d,
barang:eBarang.value,
jenis:eJenis.value,
dana:eDana.value,
jumlah:+eJumlah.value,
satuan:eSatuan.value,
ambil:eAmbil.value
};

simpan();
tutupModal();
}

function tutupModal(){
modalEdit.classList.remove('show');
}

function hapusData(i){
if(confirm("Hapus data?")){
data.splice(i,1);
simpan();
}
}

</script>

</body>
</html>
