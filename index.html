<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Inventaris SKB Muara Badak</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
.hidden{display:none}
header{background:#1e40af;color:#fff;padding:12px;display:flex;justify-content:space-between}
.container{padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#e5e7eb}
input,select,button{padding:8px;margin:4px;width:100%}
button{border:none;border-radius:6px;cursor:pointer}
button:hover{opacity:0.85}
.primary{background:#2563eb;color:#fff}
.success{background:#16a34a;color:#fff}
.danger{background:#dc2626;color:#fff}
.menu{display:flex;gap:10px}
#loginBox{max-width:400px;margin:40px auto;background:#fff;padding:20px;border-radius:12px;text-align:center}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<h3>Inventaris SKB Muara Badak</h3>
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
<header>
<h3>Dashboard Inventaris</h3>
<button class="danger" onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card menu">
<button class="primary" onclick="show('masuk')">Barang Masuk</button>
<button class="danger" onclick="show('keluar')">Barang Keluar</button>
</div>

<!-- SEARCH -->
<div class="card">
<input id="search" placeholder="Cari barang..." onkeyup="update()">
</div>

<!-- BARANG MASUK -->
<div class="card hidden" id="masuk">
<h3>Barang Masuk</h3>
<input id="mBarang" placeholder="Nama Barang">
<select id="mJenis">
<option>Barang Modal</option>
<option>BAJAS</option>
</select>
<select id="mDana">
<option>BOSKAB 1</option>
<option>BOSKAB 2</option>
<option>BOP 1</option>
<option>BOP 2</option>
</select>
<input type="number" id="mJumlah" placeholder="Jumlah">
<select id="mSatuan">
<option>rim</option><option>buah</option><option>pack</option>
<option>pcs</option><option>botol</option><option>unit</option>
<option>Kotak</option><option>Meter</option><option>Biji</option>
<option>Set</option>
</select>
<button class="success" onclick="barangMasuk()">Simpan</button>
</div>

<!-- BARANG KELUAR -->
<div class="card hidden" id="keluar">
<h3>Barang Keluar</h3>

<select id="kBarang" onchange="isiJenisDana()"></select>

<select id="kJenis">
<option>Barang Modal</option>
<option>BAJAS</option>
</select>

<select id="kDana">
<option>BOSKAB 1</option>
<option>BOSKAB 2</option>
<option>BOP 1</option>
<option>BOP 2</option>
</select>

<input type="number" id="kJumlah" placeholder="Jumlah">

<select id="kSatuan">
<option>rim</option><option>buah</option><option>pcs</option>
<option>pack</option><option>botol</option><option>unit</option>
<option>Kotak</option><option>Meter</option><option>Biji</option><option>Set</option>
</select>

<input id="kAmbil" placeholder="Nama Pengambil">

<button class="danger" onclick="barangKeluar()">Simpan</button>
</div>

<!-- DATA -->
<div class="card">
<h3>Data Inventaris</h3>
<table id="tabel"></table>
</div>

<!-- DOWNLOAD -->
<div class="card">
<h3>Download Excel</h3>
<button class="primary" onclick="downloadExcel()">Download Excel</button>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem('inv')) || [];
let editIndex = null;

function notif(p){ alert(p); }

function login(){
  if(user.value && pass.value){
    loginBox.classList.add('hidden');
    app.classList.remove('hidden');
    update();
  }
}

function logout(){
  localStorage.clear();
  location.reload();
}

function show(id){
  masuk.classList.add('hidden');
  keluar.classList.add('hidden');
  document.getElementById(id).classList.remove('hidden');
}

function getStok(nama){
  let masuk=0, keluar=0;
  data.forEach(d=>{
    if(d.barang===nama){
      if(d.tipe==='Masuk') masuk+=d.jumlah;
      if(d.tipe==='Keluar') keluar+=d.jumlah;
    }
  });
  return masuk-keluar;
}

function barangMasuk(){
  if(!mBarang.value || !mJumlah.value) return notif("Isi lengkap!");

  let obj={
    tipe:'Masuk',
    barang:mBarang.value,
    jenis:mJenis.value,
    dana:mDana.value,
    jumlah:+mJumlah.value,
    satuan:mSatuan.value
  };

  if(editIndex!=null) data[editIndex]=obj;
  else data.push(obj);

  simpan();
}

function isiJenisDana(){
  let d=data.find(x=>x.barang===kBarang.value && x.tipe==='Masuk');
  if(d){ kJenis.value=d.jenis; kDana.value=d.dana; }
}

function barangKeluar(){
  if(!kBarang.value || !kJumlah.value) return notif("Isi lengkap!");

  if(kJumlah.value > getStok(kBarang.value)){
    return notif("Stok tidak cukup!");
  }

  let obj={
    tipe:'Keluar',
    barang:kBarang.value,
    jenis:kJenis.value,
    dana:kDana.value,
    jumlah:+kJumlah.value,
    satuan:kSatuan.value,
    ambil:kAmbil.value
  };

  if(editIndex!=null) data[editIndex]=obj;
  else data.push(obj);

  simpan();
}

function edit(i){
  let d=data[i];

  if(d.tipe==='Masuk'){
    show('masuk');
    mBarang.value=d.barang;
    mJenis.value=d.jenis;
    mDana.value=d.dana;
    mJumlah.value=d.jumlah;
    mSatuan.value=d.satuan;
  }else{
    show('keluar');
    kBarang.value=d.barang;
    kJenis.value=d.jenis;
    kDana.value=d.dana;
    kJumlah.value=d.jumlah;
    kSatuan.value=d.satuan;
    kAmbil.value=d.ambil;
  }

  editIndex=i;
}

function hapus(i){
  if(confirm("Hapus data?")){
    data.splice(i,1);
    simpan();
  }
}

function simpan(){
  localStorage.setItem('inv',JSON.stringify(data));
  editIndex=null;
  update();
}

function update(){
  kBarang.innerHTML='';
  [...new Set(data.filter(d=>d.tipe==='Masuk').map(d=>d.barang))]
  .forEach(b=>kBarang.innerHTML+=`<option>${b}</option>`);

  let keyword = search.value ? search.value.toLowerCase() : "";

  tabel.innerHTML=`<tr>
  <th>No</th><th>Tipe</th><th>Barang</th><th>Jumlah</th>
  <th>Satuan</th><th>Sisa</th><th>Aksi</th></tr>`;

  data.forEach((d,i)=>{
    if(!d.barang.toLowerCase().includes(keyword)) return;

    tabel.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${d.tipe}</td>
      <td>${d.barang}</td>
      <td>${d.jumlah}</td>
      <td>${d.satuan}</td>
      <td>${getStok(d.barang)} ${d.satuan}</td>
      <td>
        <button onclick="edit(${i})">Edit</button>
        <button class="danger" onclick="hapus(${i})">Hapus</button>
      </td>
    </tr>`;
  });
}

function downloadExcel(){
  let ws=XLSX.utils.json_to_sheet(data);
  let wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Data');
  XLSX.writeFile(wb,'Inventaris.xlsx');
}
</script>

</body>
</html>
