<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Inventaris SKB Muara Badak</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f1f5f9}
.hidden{display:none}
header{background:#1e40af;color:#fff;padding:12px;display:flex;justify-content:space-between}
.container{padding:20px}
.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
th{background:#e5e7eb}
input,select,button{padding:8px;margin:4px;width:100%}
button{border:none;border-radius:6px;cursor:pointer}
button:hover{opacity:0.85}
.primary{background:#2563eb;color:#fff}
.success{background:#16a34a;color:#fff}
.danger{background:#dc2626;color:#fff}
.low{background:#fee2e2}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" style="max-width:400px;margin:40px auto;background:#fff;padding:20px;border-radius:12px;text-align:center">
<h3>Inventaris SKB</h3>
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">
<header>
<h3>Dashboard Inventaris</h3>
<button class="danger" onclick="logout()">Logout</button>
</header>

<div class="container">

<div class="card menu">
<button class="primary" onclick="show('masuk')">Barang Masuk</button>
<button class="danger" onclick="show('keluar')">Barang Keluar</button>
</div>

<div class="card">
<input id="search" placeholder="Cari barang..." onkeyup="update()">
<select id="filterTipe" onchange="update()">
<option value="">Semua</option>
<option value="Masuk">Masuk</option>
<option value="Keluar">Keluar</option>
</select>

<button onclick="backup()">Backup JSON</button>
<input type="file" onchange="restore(event)">

<br><br>
<input type="file" accept=".xlsx,.xls" onchange="importExcel(event)">
<button class="danger" onclick="resetData()">Reset Data</button>
</div>

<!-- RINGKASAN -->
<div class="card">
<h3>Ringkasan Stok</h3>
<div id="ringkasan"></div>
</div>

<!-- MASUK -->
<div class="card hidden" id="masuk">
<h3>Barang Masuk</h3>
<input id="mBarang" placeholder="Nama Barang">
<select id="mJenis">
<option>Barang Modal</option>
<option>BAJAS</option>
</select>
<select id="mDana">
<option>BOSKAB 1</option>
<option>BOSKAB 2</option>
<option>BOP 1</option>
<option>BOP 2</option>
</select>
<input type="number" id="mJumlah" placeholder="Jumlah">
<select id="mSatuan">
<option>rim</option><option>buah</option><option>pack</option>
<option>pcs</option><option>botol</option><option>unit</option>
<option>Kotak</option><option>Meter</option><option>Biji</option>
<option>Set</option>
</select>
<button class="success" onclick="barangMasuk()">Simpan</button>
</div>

<!-- KELUAR -->
<div class="card hidden" id="keluar">
<h3>Barang Keluar</h3>
<select id="kBarang" onchange="isiJenisDana()"></select>
<select id="kJenis"><option>Barang Modal</option><option>BAJAS</option></select>
<select id="kDana"><option>BOSKAB 1</option><option>BOSKAB 2</option><option>BOP 1</option><option>BOP 2</option></select>
<input type="number" id="kJumlah" placeholder="Jumlah">
<select id="kSatuan">
<option>rim</option><option>buah</option><option>pcs</option>
<option>pack</option><option>botol</option><option>unit</option>
<option>Kotak</option><option>Meter</option><option>Biji</option><option>Set</option>
</select>
<input id="kAmbil" placeholder="Nama Pengambil">
<button class="danger" onclick="barangKeluar()">Simpan</button>
</div>

<!-- TABEL -->
<div class="card">
<h3>Data Inventaris</h3>
<table id="tabel"></table>
</div>

<div class="card">
<button class="primary" onclick="downloadExcel()">Download Excel</button>
</div>

</div>
</div>

<script>

// 🔥 AUTO BACKUP
setInterval(()=>{
  localStorage.setItem('backup_auto', JSON.stringify(data));
},3000);

// 🔥 LOAD DATA + RESTORE
let data = JSON.parse(localStorage.getItem('inv')) || [];
let backup_auto = JSON.parse(localStorage.getItem('backup_auto'));

if(data.length===0 && backup_auto){
  data = backup_auto;
  localStorage.setItem('inv', JSON.stringify(data));
}

let editIndex=null;

function notif(p){alert(p)}

function login(){
if(user.value && pass.value){
loginBox.classList.add('hidden');
app.classList.remove('hidden');
update();
}
}

function logout(){localStorage.clear();location.reload();}

function show(id){
masuk.classList.add('hidden');
keluar.classList.add('hidden');
document.getElementById(id).classList.remove('hidden');
}

// STOK FIX
function getStok(nama,jenis,dana,satuan){
let masuk=0,keluar=0;
data.forEach(d=>{
if(d.barang===nama && d.jenis===jenis && d.dana===dana && d.satuan===satuan){
if(d.tipe==='Masuk') masuk+=d.jumlah;
if(d.tipe==='Keluar') keluar+=d.jumlah;
}
});
return masuk-keluar;
}

// MASUK
function barangMasuk(){
if(!mBarang.value||!mJumlah.value) return notif("Isi lengkap!");

let obj={
tipe:'Masuk',
barang:mBarang.value,
jenis:mJenis.value,
dana:mDana.value,
jumlah:+mJumlah.value,
satuan:mSatuan.value,
tanggal:new Date().toLocaleString()
};

if(editIndex!=null) data[editIndex]=obj;
else data.push(obj);

simpan();
}

// AUTO ISI
function isiJenisDana(){
let d=data.find(x=>x.barang===kBarang.value && x.tipe==='Masuk');
if(d){
kJenis.value=d.jenis;
kDana.value=d.dana;
kSatuan.value=d.satuan;
}
}

// KELUAR
function barangKeluar(){
if(!kBarang.value||!kJumlah.value) return notif("Isi lengkap!");

let stok=getStok(kBarang.value,kJenis.value,kDana.value,kSatuan.value);
if(kJumlah.value>stok) return notif("Stok tidak cukup!");

let obj={
tipe:'Keluar',
barang:kBarang.value,
jenis:kJenis.value,
dana:kDana.value,
jumlah:+kJumlah.value,
satuan:kSatuan.value,
ambil:kAmbil.value,
tanggal:new Date().toLocaleString()
};

if(editIndex!=null) data[editIndex]=obj;
else data.push(obj);

simpan();
}

// HAPUS
function hapus(i){
if(confirm("Hapus data?")){
data.splice(i,1);
simpan();
}
}

// SIMPAN
function simpan(){
localStorage.setItem('inv',JSON.stringify(data));
editIndex=null;
update();
}

// UPDATE
function update(){

kBarang.innerHTML='';
[...new Set(data.filter(d=>d.tipe==='Masuk').map(d=>d.barang))]
.forEach(b=>kBarang.innerHTML+=`<option>${b}</option>`);

let keyword=search.value?search.value.toLowerCase():"";
let filter=filterTipe.value;

tabel.innerHTML=`<tr>
<th>No</th><th>Tanggal</th><th>Tipe</th>
<th>Barang</th><th>Jenis</th><th>Dana</th>
<th>Jumlah</th><th>Satuan</th><th>Sisa</th><th>Aksi</th></tr>`;

data.slice().reverse().forEach((d,i)=>{

if(filter && d.tipe!==filter) return;
if(!d.barang.toLowerCase().includes(keyword)) return;

let stok=getStok(d.barang,d.jenis,d.dana,d.satuan);
let low=stok<=3?'class="low"':'';

tabel.innerHTML+=`
<tr ${low}>
<td>${i+1}</td>
<td>${d.tanggal||'-'}</td>
<td>${d.tipe}</td>
<td>${d.barang}</td>
<td>${d.jenis}</td>
<td>${d.dana}</td>
<td>${d.jumlah}</td>
<td>${d.satuan}</td>
<td>${stok} ${d.satuan}</td>
<td>
<button onclick="hapus(${i})">Hapus</button>
</td>
</tr>`;
});

// RINGKASAN
let sum={};
data.forEach(d=>{
let key=d.barang;
if(!sum[key]) sum[key]=0;
if(d.tipe==='Masuk') sum[key]+=d.jumlah;
if(d.tipe==='Keluar') sum[key]-=d.jumlah;
});

ringkasan.innerHTML='';
for(let k in sum){
ringkasan.innerHTML+=`<p>${k}: ${sum[k]}</p>`;
}

}

// EXCEL DOWNLOAD
function downloadExcel(){
let ws=XLSX.utils.json_to_sheet(data);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,'Data');
XLSX.writeFile(wb,'Inventaris.xlsx');
}

// IMPORT EXCEL
function importExcel(e){
let file=e.target.files[0];
let reader=new FileReader();

reader.onload=function(evt){
let dataExcel=new Uint8Array(evt.target.result);
let workbook=XLSX.read(dataExcel,{type:'array'});

let sheet=workbook.Sheets[workbook.SheetNames[0]];
let json=XLSX.utils.sheet_to_json(sheet);

json.forEach(row=>{
if(!row.Barang||!row.Jumlah) return;

data.push({
tipe:row.Tipe||'Masuk',
barang:row.Barang,
jenis:row.Jenis||'',
dana:row.Dana||'',
jumlah:+row.Jumlah||0,
satuan:row.Satuan||'',
ambil:row.Pengambil||'',
tanggal:row.Tanggal||new Date().toLocaleString()
});
});

simpan();
alert("Import Excel berhasil!");
};

reader.readAsArrayBuffer(file);
}

// BACKUP JSON
function backup(){
let blob=new Blob([JSON.stringify(data)],{type:"application/json"});
let a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download="backup.json";
a.click();
}

// RESTORE JSON
function restore(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(){
data=JSON.parse(reader.result);
simpan();
alert("Data berhasil di-restore!");
}
reader.readAsText(file);
}

// RESET
function resetData(){
if(confirm("Hapus semua data?")){
localStorage.removeItem('inv');
location.reload();
}
}

</script>

</body>
</html>
